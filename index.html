<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drakkar | Matheus Lopes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Cinzel',serif;color:#fff}
canvas#c{display:block;width:100vw;height:100vh}

/* ── LOADING ── */
#ls{
  position:fixed;inset:0;z-index:1000;
  background:radial-gradient(ellipse at 50% 100%, #1a1a1a 0%, #0a0a0a 60%, #000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.4s ease, visibility 1.4s ease;
}
#ls.out{opacity:0;visibility:hidden;pointer-events:none}

.storm-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bolt{
  position:absolute;top:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(200,220,255,0.6),transparent);
  animation:boltFlash linear infinite;
}
@keyframes boltFlash{
  0%,100%{opacity:0;height:0;top:0}
  48%{opacity:0;height:0;top:0}
  50%{opacity:1;height:40vh}
  55%{opacity:0;height:50vh}
}

.ship-wrap{position:relative;margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(180,200,255,0.4))}
.ship-svg{width:clamp(160px,22vw,260px);animation:shipRock 4s ease-in-out infinite}
@keyframes shipRock{
  0%,100%{transform:rotate(-2deg) translateY(0)}
  25%{transform:rotate(1deg) translateY(-6px)}
  75%{transform:rotate(-1deg) translateY(4px)}
}

.ls-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.6rem,4vw,3rem);
  font-weight:900;
  letter-spacing:0.1em;
  color:#e8e8e8;
  text-shadow:0 0 30px rgba(180,200,255,0.5), 0 2px 0 rgba(0,0,0,0.8);
  margin-bottom:.3rem;
  text-align:center;
}
.ls-sub{
  font-size:clamp(0.55rem,1.2vw,0.75rem);
  letter-spacing:0.45em;
  color:rgba(180,200,255,0.5);
  text-transform:uppercase;
  margin-bottom:2.5rem;
}
.prog-wrap{width:clamp(220px,38vw,340px);height:3px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:.7rem;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#556,#aac,#fff);border-radius:3px;transition:width .35s ease;box-shadow:0 0 8px rgba(180,200,255,0.7)}
.prog-txt{font-size:.65rem;letter-spacing:.35em;color:rgba(255,255,255,.3);margin-bottom:2.5rem;text-align:center}

#play-btn{
  display:none;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(180,200,255,0.45);
  color:#c8d8ff;
  font-family:'Cinzel',serif;
  font-size:clamp(.75rem,1.4vw,.9rem);
  letter-spacing:.4em;
  text-transform:uppercase;
  padding:14px 52px;
  cursor:pointer;
  transition:background .3s,box-shadow .3s,color .3s;
  animation:glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 10px rgba(180,200,255,.2)}
  50%{box-shadow:0 0 28px rgba(180,200,255,.5), 0 0 60px rgba(100,130,200,.2)}
}
#play-btn:hover{background:rgba(180,200,255,.1);color:#fff;box-shadow:0 0 40px rgba(180,200,255,.4)}

.ls-hint{margin-top:1.4rem;font-size:.58rem;letter-spacing:.25em;color:rgba(255,255,255,.18)}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  padding:22px 32px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;z-index:10;
  opacity:0;transition:opacity 1.2s ease;
}
#hud.on{opacity:1}
.hud-back a{
  font-size:.6rem;letter-spacing:.3em;color:rgba(255,255,255,.3);
  text-decoration:none;text-transform:uppercase;pointer-events:all;transition:color .3s;
}
.hud-back a:hover{color:rgba(180,200,255,.8)}
.hud-mid{text-align:center;line-height:1.9}
.hud-name{font-family:'Cinzel Decorative',serif;font-size:.75rem;letter-spacing:.2em;color:rgba(255,255,255,.55)}
.hud-coord{font-size:.55rem;letter-spacing:.25em;color:rgba(180,200,255,.4)}
.hud-right{text-align:right;font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.2);line-height:2}

#speedbar{
  position:fixed;bottom:80px;right:32px;
  display:flex;flex-direction:column;align-items:flex-end;gap:5px;
  opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;
}
#speedbar.on{opacity:1}
.spd-label{font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.25)}
.spd-track{width:90px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.spd-fill{height:100%;width:0%;background:linear-gradient(90deg,#334,#aac);transition:width .15s linear}

#ctrl{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:18px;align-items:center;
  opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;
}
#ctrl.on{opacity:1}
.key{display:flex;flex-direction:column;align-items:center;gap:4px}
.key-k{
  width:34px;height:34px;border:1px solid rgba(255,255,255,.18);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);
}
.key-l{font-size:.47rem;letter-spacing:.2em;color:rgba(255,255,255,.18)}

#mctrl{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:none;gap:14px;align-items:center;z-index:10;
}
@media(max-width:700px){#mctrl{display:flex}#ctrl{display:none}}
.mbtn{
  width:60px;height:60px;border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
  color:rgba(255,255,255,.55);font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;touch-action:manipulation;
}

.vig{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.72) 100%)}
#flash{position:fixed;inset:0;background:#c8d8ff;opacity:0;pointer-events:none;z-index:8;transition:opacity .08s}
</style>
</head>
<body>

<div id="ls">
  <div class="storm-bg" id="stormBg"></div>
  <div class="ship-wrap">
    <svg class="ship-svg" viewBox="0 0 300 170" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M10 140 Q50 130 90 140 Q130 150 170 140 Q210 130 250 140 Q275 145 290 140" stroke="rgba(140,160,200,0.3)" stroke-width="1.5" fill="none"/>
      <path d="M30 110 Q80 130 150 132 Q220 130 268 110 L255 125 Q200 148 150 150 Q100 148 45 125 Z" fill="rgba(60,50,40,0.9)" stroke="rgba(160,150,130,0.6)" stroke-width="1.5"/>
      <rect x="55" y="104" width="190" height="10" rx="2" fill="rgba(80,65,50,0.95)" stroke="rgba(140,120,90,0.5)" stroke-width="1"/>
      <path d="M255 108 Q278 98 288 86 Q295 80 292 73 Q286 68 280 74 Q284 65 278 60 Q272 65 270 73 Q265 82 260 92 Q257 99 255 108Z" fill="rgba(90,70,45,0.95)" stroke="rgba(160,130,90,0.7)" stroke-width="1.2"/>
      <circle cx="282" cy="73" r="2.5" fill="rgba(255,80,30,0.8)"/>
      <line x1="150" y1="18" x2="150" y2="108" stroke="rgba(100,80,55,0.9)" stroke-width="3"/>
      <path d="M110 38 Q150 50 190 38 L188 94 Q150 104 112 94 Z" fill="rgba(120,25,25,0.85)" stroke="rgba(160,60,60,0.6)" stroke-width="1"/>
      <text x="147" y="74" font-size="20" fill="rgba(220,180,100,0.7)" text-anchor="middle" font-family="serif">ᚠ</text>
    </svg>
  </div>
  <div class="ls-title">DRAKKAR</div>
  <div class="ls-sub">Mar do Norte · Matheus Lopes</div>
  <div class="prog-wrap"><div class="prog-fill" id="pf"></div></div>
  <div class="prog-txt" id="pt">AGUARDANDO TEMPESTADE...</div>
  <button id="play-btn" onclick="startGame()">⚔ &nbsp; ZARPAR</button>
  <div class="ls-hint">← → ↑ ↓ &nbsp;|&nbsp; WASD PARA NAVEGAR</div>
</div>

<canvas id="c"></canvas>
<div class="vig"></div>
<div id="flash"></div>

<div id="hud">
  <div class="hud-back"><a href="#">← PORTFÓLIO</a></div>
  <div class="hud-mid">
    <div class="hud-name">MATHEUS LOPES</div>
    <div class="hud-coord" id="coord">63°12'N · 17°08'W</div>
  </div>
  <div class="hud-right">AUTOMAÇÃO · IA · N8N<br><span style="color:rgba(180,200,255,.3)">NAVEGANDO</span></div>
</div>

<div id="speedbar">
  <div class="spd-label">VELOCIDADE</div>
  <div class="spd-track"><div class="spd-fill" id="sf"></div></div>
</div>

<div id="ctrl">
  <div class="key"><div class="key-k">W</div><div class="key-l">Frente</div></div>
  <div class="key"><div class="key-k">A</div><div class="key-l">Esq</div></div>
  <div class="key"><div class="key-k">S</div><div class="key-l">Ré</div></div>
  <div class="key"><div class="key-k">D</div><div class="key-l">Dir</div></div>
</div>

<div id="mctrl">
  <div class="mbtn" id="mu">↑</div>
  <div class="mbtn" id="ml">←</div>
  <div class="mbtn" id="md">↓</div>
  <div class="mbtn" id="mr">→</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// --- Lógica do Loading ---
const sb = document.getElementById('stormBg');
for(let i=0;i<8;i++){
  const b=document.createElement('div'); b.className='bolt';
  b.style.left=Math.random()*100+'vw'; b.style.animationDuration=(3+Math.random()*5)+'s';
  sb.appendChild(b);
}

const steps=[
  {p:20,t:'INVOCANDO A TEMPESTADE...'},
  {p:50,t:'CONSTRUINDO O DRAKKAR...'},
  {p:80,t:'IÇANDO AS VELAS...'},
  {p:100,t:'QUE ODIN NOS GUIE'}
];
let si=0;
function advance(){
  if(si>=steps.length)return;
  const s=steps[si++];
  document.getElementById('pf').style.width=s.p+'%';
  document.getElementById('pt').textContent=s.t;
  if(s.p===100) setTimeout(()=>document.getElementById('play-btn').style.display='block', 500);
  else setTimeout(advance, 600);
}
advance();

// --- Three.js ---
let scene, camera, renderer, clock, waterGeo, boatGroup, sailMesh;
let gameRunning = false;
let boatSpeed = 0, boatAngle = Math.PI;
const keys = {up:false, down:false, left:false, right:false};

function initThree() {
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0x050a10);
    clock = new THREE.Clock();

    const aspect = window.innerWidth / window.innerHeight;
    camera = new THREE.OrthographicCamera(-35*aspect, 35*aspect, 35, -35, 0.1, 1000);
    camera.position.set(50, 50, 50);
    camera.lookAt(0,0,0);

    renderer = new THREE.WebGLRenderer({canvas: document.getElementById('c'), antialias:true});
    renderer.setSize(window.innerWidth, window.innerHeight);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const sun = new THREE.DirectionalLight(0xffffff, 1);
    sun.position.set(10, 20, 10); scene.add(sun);

    waterGeo = new THREE.PlaneGeometry(600, 600, 100, 100);
    const water = new THREE.Mesh(waterGeo, new THREE.MeshStandardMaterial({color: 0x1a3a5a, roughness: 0.1}));
    water.rotation.x = -Math.PI/2;
    scene.add(water);

    boatGroup = new THREE.Group();
    const hull = new THREE.Mesh(new THREE.BoxGeometry(15, 2.5, 5), new THREE.MeshStandardMaterial({color: 0x3d1f10}));
    boatGroup.add(hull);
    const mast = new THREE.Mesh(new THREE.CylinderGeometry(0.2, 0.2, 12), new THREE.MeshStandardMaterial({color: 0x2a1a0a}));
    mast.position.y = 5; boatGroup.add(mast);
    sailMesh = new THREE.Mesh(new THREE.PlaneGeometry(9, 8), new THREE.MeshStandardMaterial({color: 0x8b0000, side: THREE.DoubleSide}));
    sailMesh.position.set(0, 7, 0.2); boatGroup.add(sailMesh);

    boatGroup.position.y = 1.5;
    scene.add(boatGroup);

    // Eventos
    const handleKey = (e, val) => {
        const k = e.key.toLowerCase();
        if(k==='w'||k==='arrowup') keys.up = val;
        if(k==='s'||k==='arrowdown') keys.down = val;
        if(k==='a'||k==='arrowleft') keys.left = val;
        if(k==='d'||k==='arrowright') keys.right = val;
    };
    window.addEventListener('keydown', e => handleKey(e, true));
    window.addEventListener('keyup', e => handleKey(e, false));

    // Touch Mobile
    const bindM = (id, k) => {
        document.getElementById(id).addEventListener('touchstart', (e)=>{ e.preventDefault(); keys[k]=true; });
        document.getElementById(id).addEventListener('touchend', ()=>{ keys[k]=false; });
    };
    bindM('mu','up'); bindM('md','down'); bindM('ml','left'); bindM('mr','right');
}

function loop() {
    if(!gameRunning) return;
    requestAnimationFrame(loop);
    const dt = clock.getDelta();
    const t = clock.getElapsedTime();

    // Ondas
    const pos = waterGeo.attributes.position;
    for(let i=0; i<pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i);
        pos.setZ(i, Math.sin(x*0.1 + t) * 1.2 + Math.cos(y*0.1 + t) * 0.8);
    }
    pos.needsUpdate = true;

    // Movimento
    if(keys.up) boatSpeed = Math.min(boatSpeed + 12*dt, 20);
    else if(keys.down) boatSpeed = Math.max(boatSpeed - 15*dt, -5);
    else boatSpeed *= 0.97;

    if(keys.left) boatAngle += 1.6 * dt;
    if(keys.right) boatAngle -= 1.6 * dt;

    boatGroup.position.x += Math.sin(boatAngle) * boatSpeed * dt;
    boatGroup.position.z += Math.cos(boatAngle) * boatSpeed * dt;
    boatGroup.rotation.y = boatAngle;
    boatGroup.position.y = 1.5 + Math.sin(t*1.2)*0.3;
    sailMesh.rotation.y = Math.sin(t)*0.1;

    // UI Speed
    document.getElementById('sf').style.width = (Math.abs(boatSpeed)/20 * 100) + '%';

    // Camera
    camera.position.x += (boatGroup.position.x + 50 - camera.position.x) * 0.05;
    camera.position.z += (boatGroup.position.z + 50 - camera.position.z) * 0.05;
    camera.lookAt(boatGroup.position);

    renderer.render(scene, camera);
}

function startGame() {
    document.getElementById('ls').classList.add('out');
    document.getElementById('hud').classList.add('on');
    document.getElementById('speedbar').classList.add('on');
    document.getElementById('ctrl').classList.add('on');
    gameRunning = true;
    loop();
}

initThree();
</script>
</body>
</html>
