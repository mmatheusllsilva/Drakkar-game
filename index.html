<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drakkar | Matheus Lopes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Cinzel',serif;color:#fff}
canvas#c{display:block;width:100vw;height:100vh}

/* ── LOADING ── */
#ls{
  position:fixed;inset:0;z-index:1000;
  background:radial-gradient(ellipse at 50% 100%, #1a1a1a 0%, #0a0a0a 60%, #000 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 1.4s ease, visibility 1.4s ease;
}
#ls.out{opacity:0;visibility:hidden;pointer-events:none}

/* Relâmpagos de fundo */
.storm-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bolt{
  position:absolute;top:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(200,220,255,0.6),transparent);
  animation:boltFlash linear infinite;
}
@keyframes boltFlash{
  0%,100%{opacity:0;height:0;top:0}
  48%{opacity:0;height:0;top:0}
  50%{opacity:1;height:40vh}
  55%{opacity:0;height:50vh}
}

/* Barco SVG na loading */
.ship-wrap{position:relative;margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(180,200,255,0.4))}
.ship-svg{width:clamp(160px,22vw,260px);animation:shipRock 4s ease-in-out infinite}
@keyframes shipRock{
  0%,100%{transform:rotate(-2deg) translateY(0)}
  25%{transform:rotate(1deg) translateY(-6px)}
  75%{transform:rotate(-1deg) translateY(4px)}
}

.ls-title{
  font-family:'Cinzel Decorative',serif;
  font-size:clamp(1.6rem,4vw,3rem);
  font-weight:900;
  letter-spacing:0.1em;
  color:#e8e8e8;
  text-shadow:0 0 30px rgba(180,200,255,0.5), 0 2px 0 rgba(0,0,0,0.8);
  margin-bottom:.3rem;
  text-align:center;
}
.ls-sub{
  font-size:clamp(0.55rem,1.2vw,0.75rem);
  letter-spacing:0.45em;
  color:rgba(180,200,255,0.5);
  text-transform:uppercase;
  margin-bottom:2.5rem;
}
.prog-wrap{width:clamp(220px,38vw,340px);height:3px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:.7rem;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#556,#aac,#fff);border-radius:3px;transition:width .35s ease;box-shadow:0 0 8px rgba(180,200,255,0.7)}
.prog-txt{font-size:.65rem;letter-spacing:.35em;color:rgba(255,255,255,.3);margin-bottom:2.5rem;text-align:center}

#play-btn{
  display:none;
  background:rgba(255,255,255,0.04);
  border:1px solid rgba(180,200,255,0.45);
  color:#c8d8ff;
  font-family:'Cinzel',serif;
  font-size:clamp(.75rem,1.4vw,.9rem);
  letter-spacing:.4em;
  text-transform:uppercase;
  padding:14px 52px;
  cursor:pointer;
  transition:background .3s,box-shadow .3s,color .3s;
  animation:glowPulse 2.5s ease-in-out infinite;
}
@keyframes glowPulse{
  0%,100%{box-shadow:0 0 10px rgba(180,200,255,.2)}
  50%{box-shadow:0 0 28px rgba(180,200,255,.5), 0 0 60px rgba(100,130,200,.2)}
}
#play-btn:hover{background:rgba(180,200,255,.1);color:#fff;box-shadow:0 0 40px rgba(180,200,255,.4)}

.ls-hint{margin-top:1.4rem;font-size:.58rem;letter-spacing:.25em;color:rgba(255,255,255,.18)}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;
  padding:22px 32px;
  display:flex;justify-content:space-between;align-items:flex-start;
  pointer-events:none;z-index:10;
  opacity:0;transition:opacity 1.2s ease;
}
#hud.on{opacity:1}
.hud-back a{
  font-size:.6rem;letter-spacing:.3em;color:rgba(255,255,255,.3);
  text-decoration:none;text-transform:uppercase;pointer-events:all;transition:color .3s;
}
.hud-back a:hover{color:rgba(180,200,255,.8)}
.hud-mid{text-align:center;line-height:1.9}
.hud-name{font-family:'Cinzel Decorative',serif;font-size:.75rem;letter-spacing:.2em;color:rgba(255,255,255,.55)}
.hud-coord{font-size:.55rem;letter-spacing:.25em;color:rgba(180,200,255,.4)}
.hud-right{text-align:right;font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.2);line-height:2}

/* speed bar */
#speedbar{
  position:fixed;bottom:80px;right:32px;
  display:flex;flex-direction:column;align-items:flex-end;gap:5px;
  opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;
}
#speedbar.on{opacity:1}
.spd-label{font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.25)}
.spd-track{width:90px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.spd-fill{height:100%;width:0%;background:linear-gradient(90deg,#334,#aac);transition:width .15s linear}

/* ── CONTROLS ── */
#ctrl{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:flex;gap:18px;align-items:center;
  opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;
}
#ctrl.on{opacity:1}
.key{display:flex;flex-direction:column;align-items:center;gap:4px}
.key-k{
  width:34px;height:34px;border:1px solid rgba(255,255,255,.18);border-radius:4px;
  display:flex;align-items:center;justify-content:center;
  font-size:.75rem;color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);
}
.key-l{font-size:.47rem;letter-spacing:.2em;color:rgba(255,255,255,.18)}

/* mobile */
#mctrl{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  display:none;gap:14px;align-items:center;z-index:10;
}
@media(max-width:700px){#mctrl{display:flex}#ctrl{display:none}}
.mbtn{
  width:60px;height:60px;border-radius:50%;
  border:1px solid rgba(255,255,255,.22);
  background:rgba(0,0,0,.45);backdrop-filter:blur(8px);
  color:rgba(255,255,255,.55);font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;touch-action:manipulation;
  transition:background .2s,border-color .2s;
}
.mbtn:active{background:rgba(180,200,255,.12);border-color:rgba(180,200,255,.5)}

/* vignette */
.vig{
  position:fixed;inset:0;pointer-events:none;z-index:5;
  background:radial-gradient(ellipse at center, transparent 35%, rgba(0,0,0,.72) 100%);
}

/* lightning flash overlay */
#flash{position:fixed;inset:0;background:#c8d8ff;opacity:0;pointer-events:none;z-index:8;transition:opacity .08s}
</style>
</head>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ---
// LOADING SCREEN
// ---
// Relâmpagos decorativos
const sb = document.getElementById('stormBg');
for(let i=0;i<8;i++){
  const b=document.createElement('div');
  b.className='bolt';
  b.style.left=Math.random()*100+'vw';
  b.style.animationDuration=(3+Math.random()*5)+'s';
  b.style.animationDelay=(-Math.random()*8)+'s';
  b.style.opacity=0.4+Math.random()*0.6;
  sb.appendChild(b);
}

const steps=[
  {p:12,t:'INVOCANDO A TEMPESTADE...'},
  {p:28,t:'CONSTRUINDO O DRAKKAR...'},
  {p:46,t:'GERANDO AS ONDAS...'},
  {p:63,t:'FORJANDO OS TROVÕES...'},
  {p:80,t:'ACORDANDO OS GUERREIROS...'},
  {p:95,t:'IÇANDO AS VELAS...'},
  {p:100,t:'QUE ODIN NOS GUIE'},
];
let si=0;
const pf=document.getElementById('pf');
const pt=document.getElementById('pt');
const pb=document.getElementById('play-btn');
function advance(){
  if(si>=steps.length)return;
  const s=steps[si++];
  pf.style.width=s.p+'%';
  pt.textContent=s.t;
  if(s.p===100){setTimeout(()=>{pb.style.display='block'},500);}
  else setTimeout(advance,400+Math.random()*500);
}
setTimeout(advance,200);

// ---
// THREE.JS
// ---
let scene,camera,renderer,clock;
let waterMesh,waterGeo;
let boatGroup,sailMesh,oarGroups=[];
let wakes=[];
let lightningMeshes=[];
let stormClouds=[];
let boatSpeed=0, boatAngle=Math.PI;
let gameRunning=false;
const keys={left:false,right:false,up:false,down:false};

// ── INIT ──
function initThree(){
  const canvas=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas,antialias:true});
  renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
  renderer.setSize(window.innerWidth,window.innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.2;

  scene=new THREE.Scene();
  // Céu cinza tempestuoso
  scene.background=new THREE.Color(0x6a8aaa);
  scene.fog=null;

  clock=new THREE.Clock();

  // Câmera isométrica
  const aspect=window.innerWidth/window.innerHeight;
  const d=30;
  camera=new THREE.OrthographicCamera(-d*aspect,d*aspect,d,-d,0.1,1000);
  camera.position.set(50,50,50);
  camera.lookAt(0,0,0);
  camera.zoom=1.4;
  camera.updateProjectionMatrix();

  buildLights();
  buildSky();
  buildWater();
  buildBoat();
  buildClouds();

  window.addEventListener('resize',onResize);
}

function buildLights(){
  // Ambiente suave - dia nublado
  scene.add(new THREE.AmbientLight(0x90a8c0, 2.0));
  // Sol principal - vem de lado (tarde)
  const sky=new THREE.DirectionalLight(0xffd080, 2.5);
  sky.position.set(80,60,40);
  sky.castShadow=true;
  sky.shadow.mapSize.set(2048,2048);
  sky.shadow.camera.near=1;
  sky.shadow.camera.far=400;
  sky.shadow.camera.left=-60;
  sky.shadow.camera.right=60;
  sky.shadow.camera.top=60;
  sky.shadow.camera.bottom=-60;
  scene.add(sky);
  // Preenchimento frio do outro lado
  const fill=new THREE.DirectionalLight(0x8899cc, 1.2);
  fill.position.set(-60,30,-40);
  scene.add(fill);
  // Reflexo sutil do mar
  const sea=new THREE.PointLight(0x4477aa, 0.8, 80);
  sea.position.set(0,2,0);
  scene.add(sea);
}

function buildSky(){
  // Gradiente de céu em dome
  const skyGeo=new THREE.SphereGeometry(400,24,12);
  const skyMat=new THREE.ShaderMaterial({
    side:THREE.BackSide,
    uniforms:{
      topColor:{value:new THREE.Color(0x5580aa)},
      bottomColor:{value:new THREE.Color(0xaabbc8)},
      offset:{value:20},
      exponent:{value:0.4},
    },
    vertexShader:`
      varying vec3 vWorldPos;
      void main(){vWorldPos=(modelMatrix*vec4(position,1.0)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}
    `,
    fragmentShader:`
      uniform vec3 topColor,bottomColor;uniform float offset,exponent;
      varying vec3 vWorldPos;
      void main(){float h=normalize(vWorldPos+offset).y;gl_FragColor=vec4(mix(bottomColor,topColor,max(pow(max(h,0.0),exponent),0.0)),1.0);}
    `,
  });
  scene.add(new THREE.Mesh(skyGeo,skyMat));
}

function buildWater(){
  waterGeo=new THREE.PlaneGeometry(600,600,140,140);
  const waterMat=new THREE.MeshStandardMaterial({
    color:0x4a7a9b,
    roughness:0.08,
    metalness:0.85,
    envMapIntensity:1.2,
  });
  waterMesh=new THREE.Mesh(waterGeo,waterMat);
  waterMesh.rotation.x=-Math.PI/2;
  waterMesh.receiveShadow=true;
  scene.add(waterMesh);

  // Cristas de ondas — linhas brancas
  for(let i=0;i<18;i++){
    const w=new THREE.PlaneGeometry(8+Math.random()*20,0.6);
    const wm=new THREE.MeshBasicMaterial({color:0xaabbcc,transparent:true,opacity:.18+Math.random()*.12});
    const wv=new THREE.Mesh(w,wm);
    wv.rotation.x=-Math.PI/2;
    wv.rotation.z=Math.random()*Math.PI;
    wv.position.set((Math.random()-.5)*400,(Math.random()-.5)*400,0.12);
    // usar position em espaço do plano — rotacionado
    wv.position.set((Math.random()-.5)*400,.15,(Math.random()-.5)*400);
    wv.userData={speed:0.3+Math.random()*.4,phase:Math.random()*Math.PI*2};
    scene.add(wv);
    stormClouds.push({mesh:wv,type:'wave'});
  }
}

// ── BARCO VIKING DETALHADO ──
function buildBoat(){
  boatGroup=new THREE.Group();

  const wood=new THREE.MeshStandardMaterial({color:0x8B4513,roughness:.85,metalness:.05});
  const darkWood=new THREE.MeshStandardMaterial({color:0x5C3010,roughness:.9});
  const ironMat=new THREE.MeshStandardMaterial({color:0x404040,roughness:.7,metalness:.5});
  const sailMat=new THREE.MeshStandardMaterial({color:0xcc2020,roughness:.8,side:THREE.DoubleSide});
  const goldMat=new THREE.MeshStandardMaterial({color:0xffcc22,roughness:.2,metalness:.9,emissive:0x442200,emissiveIntensity:.3});
  const redShield=new THREE.MeshStandardMaterial({color:0xcc1111,roughness:.5,emissive:0x330000,emissiveIntensity:.3});
  const blueShield=new THREE.MeshStandardMaterial({color:0x1133cc,roughness:.5,emissive:0x001133,emissiveIntensity:.3});

  // ── Hull (carena curva) ──
  const hullShape=new THREE.Shape();
  hullShape.moveTo(-5,0);
  hullShape.bezierCurveTo(-5,-.8,-2,-1.5,0,-1.6);
  hullShape.bezierCurveTo(2,-1.5,5,-.8,5,0);
  hullShape.lineTo(5,.4);
  hullShape.bezierCurveTo(5,.4,0,.6,-5,.4);
  hullShape.closePath();
  const hullExt={depth:3.2,bevelEnabled:true,bevelThickness:.12,bevelSize:.1,bevelSegments:2,
    extrudePath:new THREE.CatmullRomCurve3([
      new THREE.Vector3(-5,0,0),new THREE.Vector3(-3,-.3,0),new THREE.Vector3(0,-.5,0),
      new THREE.Vector3(3,-.3,0),new THREE.Vector3(5,0,0)
    ])
  };
  // Hull simples via BoxGeometry curvo com scale
  const hullMain=new THREE.Mesh(
    new THREE.CylinderGeometry(.8,2.2,12,10,1,false,-Math.PI*.05,Math.PI*1.1),
    wood
  );
  hullMain.scale.set(1,0.55,2.6);
  hullMain.castShadow=true;
  boatGroup.add(hullMain);

  // Fundo do casco
  const keel=new THREE.Mesh(new THREE.BoxGeometry(11.8,0.3,0.8),darkWood);
  keel.position.y=-.85;
  boatGroup.add(keel);

  // ── Deck com tábuas ──
  for(let i=-5;i<=5;i++){
    const plank=new THREE.Mesh(new THREE.BoxGeometry(.85,0.18,5.4),i%2===0?wood:darkWood);
    plank.position.set(i*1.05,.62,0);
    plank.castShadow=true;
    boatGroup.add(plank);
  }

  // ── Bordas do deck ──
  [-2.6,2.6].forEach(z=>{
    const rail=new THREE.Mesh(new THREE.BoxGeometry(12,.25,.2),darkWood);
    rail.position.set(0,.75,z);
    boatGroup.add(rail);
  });

  // ── Proa (dragon head) ──
  const dragonBody=new THREE.Mesh(new THREE.SphereGeometry(.7,8,6),wood);
  dragonBody.scale.set(1.6,.8,.9);
  dragonBody.position.set(6.8,.8,0);
  boatGroup.add(dragonBody);

  // Focinho
  const snout=new THREE.Mesh(new THREE.ConeGeometry(.35,1.2,6),wood);
  snout.rotation.z=-Math.PI/2;
  snout.position.set(8.0,.7,0);
  boatGroup.add(snout);

  // Chifres do dragão
  [-1,1].forEach(s=>{
    const horn=new THREE.Mesh(new THREE.ConeGeometry(.12,.8,5),darkWood);
    horn.rotation.z=s*.3-.2;
    horn.position.set(6.8,1.6,s*.45);
    boatGroup.add(horn);
  });

  // Olhos
  [-1,1].forEach(s=>{
    const eye=new THREE.Mesh(new THREE.SphereGeometry(.12,6,6),
      new THREE.MeshStandardMaterial({color:0xff3300,emissive:0xff1100,emissiveIntensity:1.5}));
    eye.position.set(7.4,.95,s*.4);
    boatGroup.add(eye);
  });

  // Dentes
  for(let t=0;t<4;t++){
    const tooth=new THREE.Mesh(new THREE.ConeGeometry(.07,.3,4),
      new THREE.MeshStandardMaterial({color:0xeeddbb,roughness:.5}));
    tooth.position.set(8.4+t*.05,.4+(t%2)*.1,(t-1.5)*.22);
    tooth.rotation.z=Math.PI;
    boatGroup.add(tooth);
  }

  // ── Popa ──
  const stern=new THREE.Mesh(new THREE.SphereGeometry(.6,8,6),wood);
  stern.scale.set(1,.7,.8);
  stern.position.set(-6.5,.6,0);
  boatGroup.add(stern);

  // Espiral da popa
  const sternCurl=new THREE.Mesh(new THREE.TorusGeometry(.4,.06,6,16,Math.PI*1.5),darkWood);
  sternCurl.position.set(-6.8,1.0,0);
  boatGroup.add(sternCurl);

  // ── Mastro ──
  const mast=new THREE.Mesh(new THREE.CylinderGeometry(.15,.2,9,7),darkWood);
  mast.position.set(.5,5.2,0);
  mast.castShadow=true;
  boatGroup.add(mast);

  // Base do mastro
  const mastBase=new THREE.Mesh(new THREE.CylinderGeometry(.35,.35,.5,8),wood);
  mastBase.position.set(.5,.85,0);
  boatGroup.add(mastBase);

  // Travessa
  const yard=new THREE.Mesh(new THREE.CylinderGeometry(.09,.09,6.5,6),darkWood);
  yard.rotation.z=Math.PI/2;
  yard.position.set(.5,8.2,0);
  boatGroup.add(yard);

  // ── Vela ──
  const sailGeo=new THREE.PlaneGeometry(5.8,4.2,6,6);
  // Inflar a vela com vento
  const sailPos=sailGeo.attributes.position;
  for(let i=0;i<sailPos.count;i++){
    const x=sailPos.getX(i);
    const y=sailPos.getY(i);
    const bulge=(.5-Math.abs(x/2.9))*(.5-Math.abs(y/2.1))*.8;
    sailPos.setZ(i,bulge);
  }
  sailGeo.computeVertexNormals();
  sailMesh=new THREE.Mesh(sailGeo,sailMat);
  sailMesh.position.set(.5,6.2,0);
  boatGroup.add(sailMesh);

  // Listras da vela
  for(let s=-2;s<=2;s++){
    const stripe=new THREE.Mesh(new THREE.PlaneGeometry(.55,4.0),
      new THREE.MeshStandardMaterial({color:s%2===0?0x5a0d0d:0x8b1515,side:THREE.DoubleSide,roughness:.9}));
    stripe.position.set(.5+s*1.1,6.2,.02);
    boatGroup.add(stripe);
  }

  // Runa na vela (canvas texture)
  const rc=document.createElement('canvas');rc.width=128;rc.height=128;
  const rx=rc.getContext('2d');
  rx.clearRect(0,0,128,128);
  rx.font='bold 72px serif';rx.fillStyle='rgba(220,180,80,.8)';
  rx.textAlign='center';rx.fillText('ᚠ',64,90);
  sailMesh.material; // keep ref
  const runeTex=new THREE.CanvasTexture(rc);
  const runeOverlay=new THREE.Mesh(new THREE.PlaneGeometry(1.8,1.8),
    new THREE.MeshBasicMaterial({map:runeTex,transparent:true,side:THREE.DoubleSide}));
  runeOverlay.position.set(.5,6.2,.05);
  boatGroup.add(runeOverlay);

  // Cordas da vela
  [[.5,8.5,0,6.8,.9,-3],[.5,8.5,0,6.8,.9,3]].forEach(([x1,y1,z1,x2,y2,z2])=>{
    const ropePts=[new THREE.Vector3(x1,y1,z1),new THREE.Vector3(x2,y2,z2)];
    const ropeGeo=new THREE.TubeGeometry(new THREE.CatmullRomCurve3(ropePts),.06,.04,4);
    boatGroup.add(new THREE.Mesh(ropeGeo,
      new THREE.MeshStandardMaterial({color:0x6a5a3a,roughness:.9})));
  });

  // ── Escudos ──
  const shieldPositions=[-3,-1.5,0,1.5,3];
  shieldPositions.forEach((x,i)=>{
    [-1,1].forEach(z=>{
      const shGeo=new THREE.CylinderGeometry(.55,.55,.1,10);
      const shMat=i%2===0?redShield:blueShield;
      const sh=new THREE.Mesh(shGeo,shMat);
      sh.rotation.x=Math.PI/2;
      sh.position.set(x,.72,z*2.7);
      boatGroup.add(sh);
      // aro metálico
      const rim=new THREE.Mesh(new THREE.TorusGeometry(.55,.05,6,14),ironMat);
      rim.rotation.x=Math.PI/2;
      rim.position.set(x,.73,z*2.7);
      boatGroup.add(rim);
      // umbão central
      const boss=new THREE.Mesh(new THREE.SphereGeometry(.14,7,5),goldMat);
      boss.position.set(x,.78,z*2.7);
      boatGroup.add(boss);
    });
  });

  // ── Remos ──
  oarGroups=[];
  [-3,-1,1,3].forEach(x=>{
    [-1,1].forEach(z=>{
      const oarGrp=new THREE.Group();
      const shaft=new THREE.Mesh(new THREE.CylinderGeometry(.07,.07,3.5,5),darkWood);
      shaft.rotation.z=z*-.5;
      shaft.rotation.x=.25;
      const blade=new THREE.Mesh(new THREE.BoxGeometry(.12,.8,.35),wood);
      blade.position.set(z*1.4,-1.6,z*.9);
      oarGrp.add(shaft);oarGrp.add(blade);
      oarGrp.position.set(x,.55,z*2.65);
      oarGrp.userData={phase:Math.random()*Math.PI*2,side:z};
      boatGroup.add(oarGrp);
      oarGroups.push(oarGrp);
    });
  });

  // ── Carga no deck (barris e caixas) ──
  [[1.5,.9,-1],[-1,.9,1.2],[-2,.9,-1.3]].forEach(([x,y,z])=>{
    const barrel=new THREE.Mesh(new THREE.CylinderGeometry(.32,.32,.55,8),wood);
    barrel.position.set(x,y,z);
    const hoopMat=new THREE.MeshStandardMaterial({color:0x303030,roughness:.6,metalness:.6});
    [-.1,.1].forEach(oy=>{
      const hoop=new THREE.Mesh(new THREE.TorusGeometry(.33,.04,5,10),hoopMat);
      hoop.rotation.x=Math.PI/2;
      hoop.position.set(x,y+oy,z);
      boatGroup.add(hoop);
    });
    boatGroup.add(barrel);
  });

  boatGroup.position.set(0,0,0); boatGroup.scale.set(1.0);
  // Spotlight direto no barco
  const boatSpot = new THREE.PointLight(0xfff5dd, 15, 50);
  boatSpot.position.set(0, 10, 0);
  boatGroup.add(boatSpot);

  scene.add(boatGroup);
}

function buildClouds(){
  // Nuvens de tempestade escuras
  for(let i=0;i<16;i++){
    const grp=new THREE.Group();
    const n=3+Math.floor(Math.random()*4);
    for(let j=0;j<n;j++){
      const r=6+Math.random()*8;
      const geo=new THREE.SphereGeometry(r,8,6);
      const mat=new THREE.MeshStandardMaterial({
        color:new THREE.Color().setHSL(0,.0,.65+Math.random()*.2),
        roughness:1,transparent:true,opacity:.55+Math.random()*.2,
      });
      const m=new THREE.Mesh(geo,mat);
      m.scale.y=.35+Math.random()*.2;
      m.position.set((Math.random()-.5)*18,(Math.random()-.5)*4,(Math.random()-.5)*12);
      grp.add(m);
    }
    grp.position.set((Math.random()-.5)*300,55+Math.random()*30,(Math.random()-.5)*300);
    grp.userData={speed:0.5+Math.random()*.5,drift:(Math.random()-.5)*.002};
    scene.add(grp);
    stormClouds.push({mesh:grp,type:'cloud'});
  }
}

// ── WAKE ──
const wakeMat=new THREE.MeshBasicMaterial({color:0x8899aa,transparent:true,opacity:.3,side:THREE.DoubleSide});
function spawnWake(x,z){
  const geo=new THREE.PlaneGeometry(.8,.8);
  const m=new THREE.Mesh(geo,wakeMat.clone());
  m.rotation.x=-Math.PI/2;
  m.position.set(x+(Math.random()-.5)*2,.12,z+(Math.random()-.5)*2);
  m.userData.life=1;
  scene.add(m);wakes.push(m);
}

// ── LIGHTNING (relâmpago 3D) ──
function triggerLightning(){
  const fl=document.getElementById('flash');
  fl.style.opacity='.18';
  setTimeout(()=>fl.style.opacity='0',80);
  // Ponto de luz rápido
  const l=new THREE.PointLight(0xaabbff,20,200);
  l.position.set((Math.random()-.5)*200,80,(Math.random()-.5)*200);
  scene.add(l);
  setTimeout(()=>scene.remove(l),120);
}

// ---
// GAME LOOP
// ---
let lightningTimer=0;

function loop(){
  if(!gameRunning)return;
  requestAnimationFrame(loop);
  const dt=clock.getDelta();
  const t=clock.getElapsedTime();

  // ── Água (ondas) ──
  const pos=waterGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    const x=pos.getX(i),y=pos.getY(i);
    const h=
      Math.sin(x*.08+t*.9)*1.1+
      Math.sin(y*.06+t*.7)*0.9+
      Math.sin((x+y)*.05+t*1.2)*0.6+
      Math.sin(x*.15+t*1.5)*.35;
    pos.setZ(i,h);
  }
  pos.needsUpdate=true;
  waterGeo.computeVertexNormals();

  // ── Nuvens ──
  stormClouds.forEach(c=>{
    if(c.type==='cloud'){
      c.mesh.position.x+=c.mesh.userData.speed*dt*1.5;
      if(c.mesh.position.x>300)c.mesh.position.x=-300;
    }
    if(c.type==='wave'){
      c.mesh.position.x+=.4*dt;
      if(c.mesh.position.x>300)c.mesh.position.x=-300;
    }
  });

  // ── Relâmpago aleatório ──
  lightningTimer-=dt;
  if(lightningTimer<=0){
    triggerLightning();
    lightningTimer=4+Math.random()*8;
  }

  // ── Movimento do barco ──
  const maxSpd=18,acc=10,fric=4.5,turn=1.5;
  if(keys.up)   boatSpeed=Math.min(boatSpeed+acc*dt,maxSpd);
  if(keys.down) boatSpeed=Math.max(boatSpeed-acc*dt*1.6,-maxSpd*.35);
  if(!keys.up&&!keys.down) boatSpeed+=(0-boatSpeed)*fric*dt;
  if(keys.left) boatAngle+=turn*dt*(0.3+Math.abs(boatSpeed)/maxSpd*.7);
  if(keys.right)boatAngle-=turn*dt*(0.3+Math.abs(boatSpeed)/maxSpd*.7);

  const dx=Math.sin(boatAngle)*boatSpeed*dt;
  const dz=Math.cos(boatAngle)*boatSpeed*dt;
  boatGroup.position.x+=dx;
  boatGroup.position.z+=dz;

  // Bob & roll
  boatGroup.position.y=1.5+Math.sin(t*1.1)*.28+Math.sin(t*.7)*.15;
  boatGroup.rotation.z=Math.sin(t*.9)*.032+(keys.left?.055:keys.right?-.055:0);
  boatGroup.rotation.x=Math.sin(t*.65)*.022+(boatSpeed/maxSpd)*.04;
  boatGroup.rotation.y=boatAngle;

  // Animação dos remos
  oarGroups.forEach(og=>{
    og.rotation.x=Math.sin(t*2.2+og.userData.phase)*0.35*(boatSpeed/maxSpd+.3)*og.userData.side;
  });

  // Vela balança levemente
  if(sailMesh) sailMesh.rotation.y=Math.sin(t*.6)*.04;

  // ── Wake ──
  if(Math.abs(boatSpeed)>1&&Math.random()<.4){
    spawnWake(boatGroup.position.x-dx*4,boatGroup.position.z-dz*4);
  }
  for(let i=wakes.length-1;i>=0;i--){
    const w=wakes[i];
    w.userData.life-=dt*.7;
    w.material.opacity=w.userData.life*.3;
    w.scale.setScalar(1+(1-w.userData.life)*4);
    if(w.userData.life<=0){scene.remove(w);wakes.splice(i,1);}
  }

  // ── Câmera isométrica segue barco ──
  const cx=boatGroup.position.x,cz=boatGroup.position.z;
  camera.position.x+=(cx+50-camera.position.x)*6*dt;
  camera.position.y+=(50-camera.position.y)*4*dt;
  camera.position.z+=(cz+50-camera.position.z)*6*dt;
  camera.lookAt(cx,boatGroup.position.y,cz);

  // HUD
  const lat=(63+boatGroup.position.z*.002).toFixed(3);
  const lon=(17+boatGroup.position.x*.003).toFixed(3);
  document.getElementById('coord').textContent=`${lat}°N · ${lon}°W`;
  const spdPct=Math.abs(boatSpeed)/maxSpd*100;
  document.getElementById('sf').style.width=spdPct+'%';

  renderer.render(scene,camera);
}

// ---
// INPUT
// ---
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A')keys.left=true;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=true;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W')keys.up=true;
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S')keys.down=true;
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A')keys.left=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')keys.right=false;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W')keys.up=false;
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S')keys.down=false;
});

['ml','mr','mu','md'].forEach(id=>{
  const el=document.getElementById(id);
  const k=id[1]==='l'?'left':id[1]==='r'?'right':id[1]==='u'?'up':'down';
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[k]=true},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();keys[k]=false},{passive:false});
  el.addEventListener('mousedown', ()=>keys[k]=true);
  el.addEventListener('mouseup',   ()=>keys[k]=false);
});

function onResize(){
  const a=window.innerWidth/window.innerHeight;
  const d=30;
  camera.left=-d*a;camera.right=d*a;
  camera.top=d;camera.bottom=-d;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
}

// ---
// START
// ---
function startGame(){
  document.getElementById('ls').classList.add('out');
  document.getElementById('hud').classList.add('on');
  document.getElementById('speedbar').classList.add('on');
  document.getElementById('ctrl').classList.add('on');
  if(window.innerWidth<=700){
    document.getElementById('mctrl').style.display='flex';
    document.getElementById('ctrl').style.display='none';
  }
  setTimeout(()=>{gameRunning=true;loop();},600);
}

initThree();
renderer.render(scene,camera);
</script>
