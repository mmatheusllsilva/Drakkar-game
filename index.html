<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drakkar | Matheus Lopes</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Cinzel:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;overflow:hidden;width:100vw;height:100vh;font-family:'Cinzel',serif;color:#fff}
canvas#c{display:block;width:100vw;height:100vh}

#ls{position:fixed;inset:0;z-index:1000;background:radial-gradient(ellipse at 50% 100%,#1a1a1a 0%,#0a0a0a 60%,#000 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity 1.4s ease,visibility 1.4s ease;}
#ls.out{opacity:0;visibility:hidden;pointer-events:none}
.storm-bg{position:absolute;inset:0;overflow:hidden;pointer-events:none}
.bolt{position:absolute;top:0;width:1px;background:linear-gradient(to bottom,transparent,rgba(200,220,255,0.6),transparent);animation:boltFlash linear infinite;}
@keyframes boltFlash{0%,100%{opacity:0;height:0}48%{opacity:0;height:0}50%{opacity:1;height:40vh}55%{opacity:0;height:50vh}}
.ship-wrap{margin-bottom:1.5rem;filter:drop-shadow(0 0 20px rgba(180,200,255,0.4))}
.ship-svg{width:clamp(160px,22vw,260px);animation:shipRock 4s ease-in-out infinite}
@keyframes shipRock{0%,100%{transform:rotate(-2deg) translateY(0)}25%{transform:rotate(1deg) translateY(-6px)}75%{transform:rotate(-1deg) translateY(4px)}}
.ls-title{font-family:'Cinzel Decorative',serif;font-size:clamp(1.6rem,4vw,3rem);font-weight:900;letter-spacing:0.1em;color:#e8e8e8;text-shadow:0 0 30px rgba(180,200,255,0.5),0 2px 0 rgba(0,0,0,0.8);margin-bottom:.3rem;text-align:center;}
.ls-sub{font-size:clamp(0.55rem,1.2vw,0.75rem);letter-spacing:0.45em;color:rgba(180,200,255,0.5);text-transform:uppercase;margin-bottom:2.5rem;}
.prog-wrap{width:clamp(220px,38vw,340px);height:3px;background:rgba(255,255,255,0.07);border-radius:3px;margin-bottom:.7rem;overflow:hidden}
.prog-fill{height:100%;width:0%;background:linear-gradient(90deg,#556,#aac,#fff);border-radius:3px;transition:width .35s ease;box-shadow:0 0 8px rgba(180,200,255,0.7)}
.prog-txt{font-size:.65rem;letter-spacing:.35em;color:rgba(255,255,255,.3);margin-bottom:2.5rem;text-align:center}
#play-btn{display:none;background:rgba(255,255,255,0.04);border:1px solid rgba(180,200,255,0.45);color:#c8d8ff;font-family:'Cinzel',serif;font-size:clamp(.75rem,1.4vw,.9rem);letter-spacing:.4em;text-transform:uppercase;padding:14px 52px;cursor:pointer;transition:background .3s,box-shadow .3s,color .3s;animation:glowPulse 2.5s ease-in-out infinite;}
@keyframes glowPulse{0%,100%{box-shadow:0 0 10px rgba(180,200,255,.2)}50%{box-shadow:0 0 28px rgba(180,200,255,.5),0 0 60px rgba(100,130,200,.2)}}
#play-btn:hover{background:rgba(180,200,255,.1);color:#fff;box-shadow:0 0 40px rgba(180,200,255,.4)}
.ls-hint{margin-top:1.4rem;font-size:.58rem;letter-spacing:.25em;color:rgba(255,255,255,.18)}

#hud{position:fixed;top:0;left:0;right:0;padding:22px 32px;display:flex;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:10;opacity:0;transition:opacity 1.2s ease;}
#hud.on{opacity:1}
.hud-back a{font-size:.6rem;letter-spacing:.3em;color:rgba(255,255,255,.3);text-decoration:none;text-transform:uppercase;pointer-events:all;transition:color .3s;}
.hud-back a:hover{color:rgba(180,200,255,.8)}
.hud-mid{text-align:center;line-height:1.9}
.hud-name{font-family:'Cinzel Decorative',serif;font-size:.75rem;letter-spacing:.2em;color:rgba(255,255,255,.55)}
.hud-coord{font-size:.55rem;letter-spacing:.25em;color:rgba(180,200,255,.4)}
.hud-right{text-align:right;font-size:.55rem;letter-spacing:.2em;color:rgba(255,255,255,.2);line-height:2}

#speedbar{position:fixed;bottom:80px;right:32px;display:flex;flex-direction:column;align-items:flex-end;gap:5px;opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;}
#speedbar.on{opacity:1}
.spd-label{font-size:.5rem;letter-spacing:.3em;color:rgba(255,255,255,.25)}
.spd-track{width:90px;height:2px;background:rgba(255,255,255,.08);border-radius:2px;overflow:hidden}
.spd-fill{height:100%;width:0%;background:linear-gradient(90deg,#334,#aac);transition:width .15s linear}

/* mute button */
#muteBtn{
  position:fixed;bottom:80px;left:32px;z-index:10;opacity:0;transition:opacity 1.2s;
  background:rgba(255,255,255,0.04);border:1px solid rgba(180,200,255,0.25);
  color:rgba(180,200,255,0.55);font-family:'Cinzel',serif;font-size:.55rem;
  letter-spacing:.25em;text-transform:uppercase;padding:8px 14px;cursor:pointer;
  pointer-events:none;transition:background .3s, opacity 1.2s;
}
#muteBtn.on{opacity:1;pointer-events:all}
#muteBtn:hover{background:rgba(180,200,255,.1);color:#fff}

#ctrl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:flex;gap:18px;align-items:center;opacity:0;transition:opacity 1.2s;z-index:10;pointer-events:none;}
#ctrl.on{opacity:1;pointer-events:all}
.key{display:flex;flex-direction:column;align-items:center;gap:4px}
.key-k{width:34px;height:34px;border:1px solid rgba(255,255,255,.18);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:.75rem;color:rgba(255,255,255,.4);background:rgba(255,255,255,.03);}
.key-l{font-size:.47rem;letter-spacing:.2em;color:rgba(255,255,255,.18)}
#mctrl{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);display:none;gap:14px;align-items:center;z-index:10;}
@media(max-width:700px){#mctrl{display:flex}#ctrl{display:none}}
.mbtn{width:60px;height:60px;border-radius:50%;border:1px solid rgba(255,255,255,.22);background:rgba(0,0,0,.45);backdrop-filter:blur(8px);color:rgba(255,255,255,.55);font-size:1.3rem;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;touch-action:manipulation;transition:background .2s,border-color .2s;}
.mbtn:active{background:rgba(180,200,255,.12);border-color:rgba(180,200,255,.5)}
.vig{position:fixed;inset:0;pointer-events:none;z-index:5;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,.72) 100%);}
#flash{position:fixed;inset:0;background:#c8d8ff;opacity:0;pointer-events:none;z-index:8;transition:opacity .05s}
</style>
</head>
<body>

<div id="ls">
  <div class="storm-bg" id="stormBg"></div>
  <div class="ship-wrap">
    <svg class="ship-svg" viewBox="0 0 300 170" fill="none" xmlns="http://www.w3.org/2000/svg">

  </div>
  <div class="ls-title">DRAKKAR</div>

<canvas id="c"></canvas>

<div id="hud">
  <div class="hud-back"><a href="https://portifolio-matheus-murex.vercel.app" target="_blank">← PORTFÓLIO</a></div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ── LOADING ──
const sb=document.getElementById('stormBg');
for(let i=0;i<8;i++){
  const b=document.createElement('div');b.className='bolt';
  b.style.left=Math.random()*100+'vw';
  b.style.animationDuration=(3+Math.random()*5)+'s';
  b.style.animationDelay=(-Math.random()*8)+'s';
  b.style.opacity=0.4+Math.random()*0.6;
  sb.appendChild(b);
}
const STEPS=[
  {p:12,t:'INVOCANDO A TEMPESTADE...'},
  {p:28,t:'CONSTRUINDO O DRAKKAR...'},
  {p:46,t:'GERANDO AS ONDAS...'},
  {p:63,t:'FORJANDO OS TROVÕES...'},
  {p:80,t:'ACORDANDO OS GUERREIROS...'},
  {p:95,t:'IÇANDO AS VELAS...'},
  {p:100,t:'QUE ODIN NOS GUIE'},
];
let si=0;
function advance(){
  if(si>=STEPS.length)return;
  const s=STEPS[si++];
  document.getElementById('pf').style.width=s.p+'%';
  document.getElementById('pt').textContent=s.t;
  if(s.p===100)setTimeout(()=>document.getElementById('play-btn').style.display='block',500);
  else setTimeout(advance,400+Math.random()*500);
}
setTimeout(advance,200);

// ── AUDIO SYSTEM ──
// Volumes:
//   MENU:   music=0.55  storm=0.08  (música em destaque, tempestade suave de fundo)
//   GAME:   music=0.28  storm=0.30  (tempestade cresce, música recua)
const VOL = {
  menu:  { music: 0.55, storm: 0.08 },
  game:  { music: 0.28, storm: 0.30 },
};

let audioCtx = null;
let musicSrc = null, stormSrc = null;
let musicGain = null, stormGain = null;
let masterGain = null;
let audioReady = false;
let muted = false;
let audioState = 'menu'; // 'menu' | 'game'

function initAudio(){
  if(audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);

    musicGain = audioCtx.createGain();
    musicGain.gain.value = VOL.menu.music;
    musicGain.connect(masterGain);

    stormGain = audioCtx.createGain();
    stormGain.gain.value = VOL.menu.storm;
    stormGain.connect(masterGain);

    // Load and start both tracks
    loadTrack('music.mp3', musicGain, node => { musicSrc = node; });
    loadTrack('storm.mp3', stormGain, node => { stormSrc = node; });

    audioReady = true;
  } catch(e) {
    console.warn('Audio init failed:', e);
  }
}

function loadTrack(url, gainNode, cb){
  fetch(url)
    .then(r => r.arrayBuffer())
    .then(buf => audioCtx.decodeAudioData(buf))
    .then(decoded => {
      const src = audioCtx.createBufferSource();
      src.buffer = decoded;
      src.loop = true;
      src.connect(gainNode);
      src.start(0);
      cb(src);
    })
    .catch(e => console.warn('Audio load failed for', url, e));
}

function setAudioState(state){
  if(!audioReady || !audioCtx) return;
  audioState = state;
  const v = VOL[state];
  const t = audioCtx.currentTime;
  // Smooth crossfade over 2.5 seconds
  if(musicGain) musicGain.gain.linearRampToValueAtTime(muted ? 0 : v.music, t + 2.5);
  if(stormGain) stormGain.gain.linearRampToValueAtTime(muted ? 0 : v.storm, t + 2.5);
}

function toggleMute(){
  muted = !muted;
  const btn = document.getElementById('muteBtn');
  if(!audioReady) return;
  const t = audioCtx.currentTime;
  masterGain.gain.linearRampToValueAtTime(muted ? 0 : 1.0, t + 0.3);
  btn.textContent = muted ? '♪ MUDO' : '♪ SOM';
  btn.style.color = muted ? 'rgba(255,100,100,0.6)' : 'rgba(180,200,255,0.55)';
}

// ── THREE.JS ENGINE ──
let scene,camera,renderer,clock;
let waterGeo,waterMesh;
let boatGroup,sailMesh,oarGroups=[];
let wakes=[],clouds=[];
let ltTimer=0;
let boatSpeed=0, boatAngle=0;
let running=false;
const K={l:false,r:false,u:false,d:false};

const WAVE_AMP = 0.9;
const BOAT_BASE_Y = WAVE_AMP + 1.8;
// Slightly closer zoom than before
const CAM_D = 90;
const CAM_ZOOM = 0.95; // was 0.75, now a bit closer

function init(){
  const cv=document.getElementById('c');
  renderer=new THREE.WebGLRenderer({canvas:cv,antialias:true});
  renderer.setPixelRatio(Math.min(devicePixelRatio,2));
  renderer.setSize(innerWidth,innerHeight);
  renderer.shadowMap.enabled=true;
  renderer.shadowMap.type=THREE.PCFSoftShadowMap;
  renderer.toneMapping=THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure=1.1;

  scene=new THREE.Scene();
  scene.background=new THREE.Color(0x5a7a99);
  scene.fog=new THREE.FogExp2(0x6a8aaa,0.0012);
  clock=new THREE.Clock();

  const a=innerWidth/innerHeight;
  camera=new THREE.OrthographicCamera(-CAM_D*a,CAM_D*a,CAM_D,-CAM_D,0.1,2000);
  camera.position.set(CAM_D,CAM_D*0.6,CAM_D);
  camera.lookAt(0,0,0);
  camera.zoom=CAM_ZOOM;
  camera.updateProjectionMatrix();

  mkLights(); mkSky(); mkWater(); mkBoat(); mkClouds();
  window.addEventListener('resize',onResize);
}

function mkLights(){
  scene.add(new THREE.AmbientLight(0xffffff,1.3));
  const sun=new THREE.DirectionalLight(0xfff0dd,2.2);
  sun.position.set(40,70,30);
  sun.castShadow=true;
  sun.shadow.mapSize.set(1024,1024);
  sun.shadow.camera.left=-120;
  sun.shadow.camera.right=120;
  sun.shadow.camera.top=120;
  sun.shadow.camera.bottom=-120;
  sun.shadow.camera.far=500;
  scene.add(sun);
  const fill=new THREE.DirectionalLight(0x8899cc,0.8);
  fill.position.set(-30,20,-40);
  scene.add(fill);
}

function mkSky(){
  const geo=new THREE.SphereGeometry(600,20,12);
  const mat=new THREE.ShaderMaterial({
    side:THREE.BackSide,
    uniforms:{T:{value:new THREE.Color(0x2e4a72)},B:{value:new THREE.Color(0x8aacbe)}},
    vertexShader:`varying vec3 vP;void main(){vP=(modelMatrix*vec4(position,1.)).xyz;gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.);}`,
    fragmentShader:`uniform vec3 T,B;varying vec3 vP;void main(){float h=clamp(normalize(vP).y*.5+.5,0.,1.);gl_FragColor=vec4(mix(B,T,h),1.);}`,
  });
  scene.add(new THREE.Mesh(geo,mat));
}

function mkWater(){
  waterGeo=new THREE.PlaneGeometry(900,900,160,160);
  const mat=new THREE.MeshStandardMaterial({color:0x1e4f6e,roughness:0.08,metalness:0.8});
  waterMesh=new THREE.Mesh(waterGeo,mat);
  waterMesh.rotation.x=-Math.PI/2;
  waterMesh.position.y=0;
  waterMesh.receiveShadow=true;
  scene.add(waterMesh);
  for(let i=0;i<30;i++){
    const w=new THREE.PlaneGeometry(10+Math.random()*25,0.5+Math.random()*0.4);
    const wm=new THREE.MeshBasicMaterial({color:0xddeeff,transparent:true,opacity:.22+Math.random()*.18});
    const wv=new THREE.Mesh(w,wm);
    wv.rotation.x=-Math.PI/2;wv.rotation.z=Math.random()*Math.PI;
    wv.position.set((Math.random()-.5)*600,0.2,(Math.random()-.5)*600);
    wv.userData={spd:0.4+Math.random()*.6};
    scene.add(wv);clouds.push({mesh:wv,type:'foam'});
  }
}

function waveH(x,z,t){
  return(
    Math.sin(x*0.10+t*1.0)*WAVE_AMP*0.55+
    Math.sin(z*0.08+t*0.75)*WAVE_AMP*0.50+
    Math.sin((x+z)*0.06+t*1.3)*WAVE_AMP*0.30+
    Math.sin(x*0.18+t*1.7)*WAVE_AMP*0.18+
    Math.cos(z*0.14+t*0.9)*WAVE_AMP*0.15
  );
}

function mkBoat(){
  boatGroup=new THREE.Group();
  function M(c,ds){return new THREE.MeshStandardMaterial({color:c,roughness:0.95,metalness:0.0,flatShading:true,side:ds?THREE.DoubleSide:THREE.FrontSide});}
  const hullBrown=M(0x5a2e0c),dkBrown=M(0x3a1a06),wineRed=M(0x6e1010);
  const sailWine=M(0x701515,true),sailCream=M(0xd8d0b8,true);
  const shCream=M(0xddd5b8),shRed=M(0x6e1010),shBlue=M(0x142066);
  const eyeGlow=new THREE.MeshStandardMaterial({color:0xffcc00,emissive:0xffaa00,emissiveIntensity:2.5,flatShading:true});

  const lx=5.5,bz=2.2,th=1.4,tp=0.6;
  const hGeo=new THREE.BufferGeometry();
  const hV=new Float32Array([-lx,th,-bz,lx,th,-bz,lx,th,bz,-lx,th,bz,-lx+tp,-th,-bz+tp,lx-tp,-th,-bz+tp,lx-tp,-th,bz-tp,-lx+tp,-th,bz-tp]);
  const hI=[0,2,1,0,3,2,4,5,6,4,6,7,0,1,5,0,5,4,2,3,7,2,7,6,0,4,7,0,7,3,1,2,6,1,6,5];
  hGeo.setAttribute('position',new THREE.BufferAttribute(hV,3));
  hGeo.setIndex(hI);hGeo.computeVertexNormals();
  boatGroup.add(Object.assign(new THREE.Mesh(hGeo,hullBrown),{castShadow:true,receiveShadow:true}));

  function add(g,x,y,z,m){const mesh=new THREE.Mesh(g,m||dkBrown);mesh.position.set(x,y,z);mesh.castShadow=true;boatGroup.add(mesh);return mesh;}
  add(new THREE.BoxGeometry(11.2,0.3,0.8),0,-th-0.05,0);
  add(new THREE.BoxGeometry(10.5,0.4,3.6),0,th,0,wineRed);

  const mast=new THREE.Mesh(new THREE.CylinderGeometry(0.14,0.20,11,6),dkBrown);
  mast.position.set(0,th+0.4+5.5,0);mast.castShadow=true;boatGroup.add(mast);
  const yard=new THREE.Mesh(new THREE.CylinderGeometry(0.09,0.09,8.0,6),dkBrown);
  yard.rotation.x=Math.PI/2;yard.position.set(0,th+0.4+9.8,0);boatGroup.add(yard);
  add(new THREE.BoxGeometry(0.5,0.5,0.5),0,th+0.4+11.2,0);

  const PH=6.2,PW=2.55;
  [[-PW,sailWine],[0,sailCream],[PW,sailWine]].forEach(([z,mat])=>{
    const s=new THREE.Mesh(new THREE.PlaneGeometry(PW-0.05,PH),mat);
    s.rotation.y=Math.PI/2;s.position.set(0,th+0.4+9.8-PH/2,z);boatGroup.add(s);
  });
  sailMesh=boatGroup.children[boatGroup.children.length-1];

  [[-3.8],[3.8]].forEach(([z])=>{
    const start=new THREE.Vector3(0,th+0.4+9.8,z);
    const end=new THREE.Vector3(z>0?4.5:-4.5,th+0.6,z>0?2.0:-2.0);
    const dir=new THREE.Vector3().subVectors(end,start);
    const len=dir.length();
    const rope=new THREE.Mesh(new THREE.CylinderGeometry(0.04,0.04,len,4),dkBrown);
    const mid=new THREE.Vector3().addVectors(start,end).multiplyScalar(0.5);
    rope.position.copy(mid);rope.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir.clone().normalize());
    boatGroup.add(rope);
  });

  const neck=add(new THREE.BoxGeometry(0.65,2.4,0.65),5.8,th+1.0,0,wineRed);neck.rotation.z=-0.35;
  const hd=add(new THREE.BoxGeometry(1.5,0.85,0.85),6.6,th+2.4,0,wineRed);hd.rotation.z=-0.2;
  add(new THREE.BoxGeometry(1.1,0.45,0.55),7.5,th+2.1,0,wineRed);
  add(new THREE.BoxGeometry(0.8,0.22,0.42),7.4,th+1.75,0);
  add(new THREE.BoxGeometry(0.22,0.22,0.1),6.95,th+2.55,0.44,eyeGlow);
  const horn=add(new THREE.CylinderGeometry(0.04,0.16,0.85,4),6.5,th+3.35,0);horn.rotation.z=0.2;
  const st1=add(new THREE.BoxGeometry(0.65,2.0,0.6),-5.8,th+1.0,0,wineRed);st1.rotation.z=0.35;
  const st2=add(new THREE.BoxGeometry(0.5,0.6,0.5),-6.3,th+2.5,0,wineRed);st2.rotation.z=0.65;

  [-3.5,-1.75,0,1.75,3.5].forEach((x,i)=>{
    [1,-1].forEach(z=>{
      const sh=new THREE.Mesh(new THREE.CylinderGeometry(0.56,0.56,0.12,8),shCream);
      sh.rotation.x=Math.PI/2;sh.position.set(x,th+0.05,z*2.05);boatGroup.add(sh);
      const m2=i%2===0?shRed:shBlue;
      [new THREE.BoxGeometry(0.72,0.12,0.12),new THREE.BoxGeometry(0.12,0.12,0.72)].forEach(g=>{
        const c=new THREE.Mesh(g,m2);c.position.set(x,th+0.12,z*2.05);boatGroup.add(c);
      });
    });
  });

  oarGroups=[];
  [-3.5,-1.0,1.5].forEach(x=>{
    [-1,1].forEach(z=>{
      const g=new THREE.Group();
      const sh=new THREE.Mesh(new THREE.CylinderGeometry(0.065,0.065,5.0,5),dkBrown);
      sh.rotation.z=z*0.55;sh.rotation.x=0.18;
      const bl=new THREE.Mesh(new THREE.BoxGeometry(0.1,0.85,0.32),hullBrown);
      bl.position.set(z*1.8,-2.2,z*0.75);
      g.add(sh);g.add(bl);g.position.set(x,th-0.2,z*2.2);
      g.userData={ph:Math.random()*Math.PI*2,s:z};
      boatGroup.add(g);oarGroups.push(g);
    });
  });

  const bl=new THREE.PointLight(0xfff0cc,6,40);bl.position.set(0,8,0);boatGroup.add(bl);
  boatGroup.position.set(0,BOAT_BASE_Y,0);
  scene.add(boatGroup);
}

function mkClouds(){
  for(let i=0;i<28;i++){
    const g=new THREE.Group();
    const n=3+Math.floor(Math.random()*5);
    for(let j=0;j<n;j++){
      const r=5+Math.random()*9;
      const m=new THREE.Mesh(new THREE.SphereGeometry(r,6,4),
        new THREE.MeshStandardMaterial({color:new THREE.Color().setHSL(0.58,0.04,0.50+Math.random()*.2),roughness:1,transparent:true,opacity:.45+Math.random()*.3,flatShading:true}));
      m.scale.y=0.25+Math.random()*.18;m.position.set((Math.random()-.5)*22,(Math.random()-.5)*4,(Math.random()-.5)*14);g.add(m);
    }
    g.position.set((Math.random()-.5)*700,55+Math.random()*35,(Math.random()-.5)*700);
    g.userData={spd:0.3+Math.random()*.6,type:'cloud'};
    scene.add(g);clouds.push({mesh:g,type:'cloud'});
  }
}

function spawnWake(x,z){
  const m=new THREE.Mesh(new THREE.PlaneGeometry(1.2,1.2),
    new THREE.MeshBasicMaterial({color:0x99bbcc,transparent:true,opacity:.4,side:THREE.DoubleSide}));
  m.rotation.x=-Math.PI/2;m.position.set(x+(Math.random()-.5)*1.5,0.15,z+(Math.random()-.5)*1.5);
  m.userData.life=1;scene.add(m);wakes.push(m);
}

function doLightning(){
  const fl=document.getElementById('flash');
  fl.style.transition='opacity .04s';fl.style.opacity='.22';
  setTimeout(()=>{fl.style.opacity='0';},70);
  setTimeout(()=>{fl.style.opacity='.14';},130);
  setTimeout(()=>{fl.style.opacity='0';},190);
  const l=new THREE.PointLight(0xbbccff,80,400);
  l.position.set((Math.random()-.5)*300,100,(Math.random()-.5)*300);
  scene.add(l);setTimeout(()=>scene.remove(l),200);
  setTimeout(()=>{
    const l2=new THREE.PointLight(0xaabbff,50,300);
    l2.position.set((Math.random()-.5)*200,90,(Math.random()-.5)*200);
    scene.add(l2);setTimeout(()=>scene.remove(l2),100);
  },140);
}

function loop(){
  if(!running||!boatGroup)return;
  requestAnimationFrame(loop);
  const dt=Math.min(clock.getDelta(),0.05);
  const t=clock.getElapsedTime();

  const pos=waterGeo.attributes.position;
  for(let i=0;i<pos.count;i++){
    pos.setZ(i,waveH(pos.getX(i),pos.getY(i),t)*1.8);
  }
  pos.needsUpdate=true;waterGeo.computeVertexNormals();

  const MAX=20,ACC=14,FRIC=5.5,TURN=1.8;
  if(K.u)boatSpeed=Math.min(boatSpeed+ACC*dt,MAX);
  if(K.d)boatSpeed=Math.max(boatSpeed-ACC*dt*2.0,-MAX*0.35);
  if(!K.u&&!K.d){boatSpeed*=Math.pow(1-FRIC*dt,1);if(Math.abs(boatSpeed)<0.05)boatSpeed=0;}
  const tf=0.15+Math.abs(boatSpeed)/MAX*0.85;
  if(K.l)boatAngle+=TURN*dt*tf;
  if(K.r)boatAngle-=TURN*dt*tf;

  const dx=Math.cos(boatAngle)*boatSpeed*dt;
  const dz=-Math.sin(boatAngle)*boatSpeed*dt;
  boatGroup.position.x+=dx;boatGroup.position.z+=dz;

  const bx=boatGroup.position.x,bz2=boatGroup.position.z;
  const wh=waveH(bx,bz2,t);
  boatGroup.position.y=wh+BOAT_BASE_Y;

  const dzdx=(waveH(bx+0.8,bz2,t)-waveH(bx-0.8,bz2,t))/1.6;
  const dzdz=(waveH(bx,bz2+0.8,t)-waveH(bx,bz2-0.8,t))/1.6;
  boatGroup.rotation.z=-dzdx*0.18+(K.l?.06:K.r?-.06:0);
  boatGroup.rotation.x=dzdz*0.18+(boatSpeed/MAX)*0.04;
  boatGroup.rotation.y=boatAngle;

  oarGroups.forEach(o=>{o.rotation.x=Math.sin(t*2.5+o.userData.ph)*0.38*(Math.abs(boatSpeed)/MAX+.2)*o.userData.s;});
  if(sailMesh)sailMesh.rotation.z=Math.sin(t*.65)*.025;

  clouds.forEach(c=>{
    if(c.type==='cloud'){c.mesh.position.x+=c.mesh.userData.spd*dt*1.8;if(c.mesh.position.x>500)c.mesh.position.x=-500;}
    if(c.type==='foam'){
      c.mesh.position.x+=c.mesh.userData.spd*dt*2.5;if(c.mesh.position.x>500)c.mesh.position.x=-500;
      c.mesh.position.y=waveH(c.mesh.position.x,c.mesh.position.z,t)*1.8+0.18;
    }
  });

  ltTimer-=dt;if(ltTimer<=0){doLightning();ltTimer=2.5+Math.random()*6;}

  if(Math.abs(boatSpeed)>0.5&&Math.random()<.35)spawnWake(boatGroup.position.x-dx*3,boatGroup.position.z-dz*3);
  for(let i=wakes.length-1;i>=0;i--){
    const w=wakes[i];w.userData.life-=dt*.65;w.material.opacity=w.userData.life*.4;
    w.scale.setScalar(1+(1-w.userData.life)*5);
    if(w.userData.life<=0){scene.remove(w);wakes.splice(i,1);}
  }

  const tx=boatGroup.position.x+CAM_D,ty=CAM_D*0.6,tz=boatGroup.position.z+CAM_D;
  camera.position.x+=(tx-camera.position.x)*5*dt;
  camera.position.y+=(ty-camera.position.y)*3*dt;
  camera.position.z+=(tz-camera.position.z)*5*dt;
  camera.lookAt(boatGroup.position.x,boatGroup.position.y*0.3,boatGroup.position.z);

  document.getElementById('coord').textContent=`${(63+boatGroup.position.z*.0012).toFixed(3)}°N · ${(17+boatGroup.position.x*.0018).toFixed(3)}°W`;
  document.getElementById('sf').style.width=(Math.abs(boatSpeed)/MAX*100)+'%';

  renderer.render(scene,camera);
}

// ── INPUT ──
window.addEventListener('keydown',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A'){K.l=true;e.preventDefault();}
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D'){K.r=true;e.preventDefault();}
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W'){K.u=true;e.preventDefault();}
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S'){K.d=true;e.preventDefault();}
});
window.addEventListener('keyup',e=>{
  if(e.key==='ArrowLeft' ||e.key==='a'||e.key==='A')K.l=false;
  if(e.key==='ArrowRight'||e.key==='d'||e.key==='D')K.r=false;
  if(e.key==='ArrowUp'   ||e.key==='w'||e.key==='W')K.u=false;
  if(e.key==='ArrowDown' ||e.key==='s'||e.key==='S')K.d=false;
});
['ml','mr','mu','md'].forEach(id=>{
  const el=document.getElementById(id);
  const k=id[1]==='l'?'l':id[1]==='r'?'r':id[1]==='u'?'u':'d';
  el.addEventListener('touchstart',e=>{e.preventDefault();K[k]=true},{passive:false});
  el.addEventListener('touchend',  e=>{e.preventDefault();K[k]=false},{passive:false});
  el.addEventListener('mousedown',()=>K[k]=true);
  el.addEventListener('mouseup',  ()=>K[k]=false);
  el.addEventListener('mouseleave',()=>K[k]=false);
});

function onResize(){
  const a=innerWidth/innerHeight;
  camera.left=-CAM_D*a;camera.right=CAM_D*a;
  camera.top=CAM_D;camera.bottom=-CAM_D;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
}

function startGame(){
  // Init audio on user gesture (required by browsers)
  initAudio();

  document.getElementById('ls').classList.add('out');
  document.getElementById('hud').classList.add('on');
  document.getElementById('speedbar').classList.add('on');
  document.getElementById('ctrl').classList.add('on');
  document.getElementById('muteBtn').classList.add('on');
  if(innerWidth<=700){
    document.getElementById('mctrl').style.display='flex';
    document.getElementById('ctrl').style.display='none';
  }
  // After fade-in: switch to game audio mix
  setTimeout(()=>{
    running=true;clock.start();loop();
    setAudioState('game');
  },600);
}

init();
renderer.render(scene,camera);
</script>
